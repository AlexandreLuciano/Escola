<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle - Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="panel">
    <div class="section">
        <div class="row">
            <div>
                <span class="label">Sensor 1</span>
                <div id="f1" class="sensor off">OFF</div>
            </div>
            <div>
                <span class="label">Sensor 2</span>
                <div id="f2" class="sensor off">OFF</div>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="label">Bateria Externa</span>
        <div id="batLevel" class="bat-container">100%</div>
    </div>

    <div class="section">
        <div class="row">
            <div>
                <span class="label">Bt1 </span>
                <button id="btnA" class="btn-cmd wide" onclick="alternarBotao('btnA')">Desligado</button>
            </div>
            <div>
                <span class="label">Bt2</span>
                <button id="btnB" class="btn-cmd normal" onclick="alternarBotao('btnB')">Desligado</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica visual dos botões de comando
    function alternarBotao(id) {
        const btn = document.getElementById(id);
        
        // Alterna a classe de cor
        btn.classList.toggle('btn-active');

        // Alterna o texto
        if (btn.classList.contains('btn-active')) {
            btn.innerText = "Ligado";
        } else {
            btn.innerText = "Desligado";
        }
    }

    /* DICA PARA Depois:
       Para mudar os sensores via código, você usará:
       document.getElementById('f1').className = "sensor on";
       document.getElementById('f1').innerText = "ON";
       
       Para mudar a bateria:
       document.getElementById('batLevel').innerText = "75%";
    */
</script>

</body>
</html>
