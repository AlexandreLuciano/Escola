<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle - Interface</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .panel { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .section { margin-bottom: 35px; }
        .label { font-size: 11px; color: #888; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; display: block; font-weight: bold; }
        .row { display: flex; gap: 20px; }

        /* --- SENSORES (FASE 1 e 2) --- */
        /* Aqui é onde o hardware vai mandar o sinal depois */
        .sensor {
            padding: 12px; border: 2px solid #444; background: #252525;
            text-align: center; border-radius: 8px; width: 100px; font-weight: bold; transition: 0.4s;
        }
        /* Classe para quando o sensor detectar ligado */
        .sensor.on { border-color: #00ff88; color: #00ff88; box-shadow: inset 0 0 10px rgba(0,255,136,0.1); }
        /* Classe para quando o sensor detectar desligado */
        .sensor.off { border-color: #ff4444; color: #ff4444; opacity: 0.6; }

        /* --- BATERIA --- */
        .bat-container { font-size: 28px; font-weight: bold; color: #00d4ff; padding: 15px; border: 2px solid #00d4ff; display: inline-block; border-radius: 8px; background: rgba(0,212,255,0.05); min-width: 80px; text-align: center; }

        /* --- BOTÕES BT1 (A e B) --- */
        .btn-cmd { 
            padding: 12px; border: 2px solid #666; background: #333; color: white; 
            cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.2s;
            text-transform: uppercase; outline: none;
        }
        .btn-cmd:hover { background: #444; border-color: #888; }
        .btn-cmd:active { transform: translateY(2px); }
        
        /* Cor quando o botão for acionado */
        .btn-active { background: #00d4ff !important; border-color: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px rgba(0,212,255,0.4); }
        
        .wide { width: 160px; } /* Botão largo como no desenho */
        .normal { width: 110px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="section">
        <div class="row">
            <div>
                <span class="label">Sensor 1</span>
                <div id="f1" class="sensor off">OFF</div>
            </div>
            <div>
                <span class="label">Sensor 2</span>
                <div id="f2" class="sensor off">OFF</div>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="label">Bateria Externa</span>
        <div id="batLevel" class="bat-container">100%</div>
    </div>

    <div class="section">
        <div class="row">
            <div>
                <span class="label">Bt1 </span>
                <button id="btnA" class="btn-cmd wide" onclick="alternarBotao('btnA')">Desligado</button>
            </div>
            <div>
                <span class="label">Bt2</span>
                <button id="btnB" class="btn-cmd normal" onclick="alternarBotao('btnB')">Desligado</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica visual dos botões de comando
    function alternarBotao(id) {
        const btn = document.getElementById(id);
        
        // Alterna a classe de cor
        btn.classList.toggle('btn-active');

        // Alterna o texto
        if (btn.classList.contains('btn-active')) {
            btn.innerText = "Ligado";
        } else {
            btn.innerText = "Desligado";
        }
    }

    /* DICA PARA Depois:
       Para mudar os sensores via código, você usará:
       document.getElementById('f1').className = "sensor on";
       document.getElementById('f1').innerText = "ON";
       
       Para mudar a bateria:
       document.getElementById('batLevel').innerText = "75%";
    */
</script>

</body>
</html>
